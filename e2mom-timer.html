<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E2MOM — Upper Body Timer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #f0ece4;
    --muted: #555;
    --accent: #e8d5b0;
    --red: #d94f3d;
    --green: #5a9a6e;
    --blue: #4a7fa5;
    --work-color: #d94f3d;
    --rest-color: #4a7fa5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    gap: 0 32px;
  }

  /* ─── HEADER ─── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .header-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ─── MAIN PANEL ─── */
  .main-panel {
    grid-column: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 0;
  }

  /* State tag */
  .state-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    height: 20px;
    transition: color 0.3s;
  }

  .state-tag.working { color: var(--red); }
  .state-tag.resting { color: var(--blue); }

  .blink-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .working .blink-dot { animation: blink 0.6s infinite alternate; }
  @keyframes blink { to { opacity: 0.1; } }

  /* Big time */
  .time-wrap { position: relative; margin-bottom: 8px; }

  .big-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(96px, 18vw, 180px);
    line-height: 0.9;
    color: var(--text);
    letter-spacing: -2px;
    transition: color 0.4s;
  }

  .big-time.working { color: var(--red); }

  /* Work countdown overlay */
  .work-time {
    position: absolute;
    bottom: -4px;
    right: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--red);
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 1px;
  }
  .work-time.visible { opacity: 1; }

  /* Progress bar */
  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 16px 0 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--rest-color);
    border-radius: 2px;
    transition: width 0.8s linear, background 0.4s;
    width: 100%;
  }

  .progress-fill.working { background: var(--work-color); }

  /* Current exercise */
  .current-exercise {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 24px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 32px;
    transition: border-color 0.4s;
  }

  .current-exercise.working { border-color: var(--red); }

  .ex-glyph {
    font-size: 36px;
    width: 52px;
    text-align: center;
    flex-shrink: 0;
  }

  .ex-info { flex: 1; }

  .ex-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text);
  }

  .ex-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .round-tag {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-align: right;
  }

  .round-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    display: block;
    line-height: 1;
  }

  /* Controls */
  .controls { display: flex; gap: 12px; }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    flex: 1;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.98); }

  .btn-start {
    border-color: var(--accent);
    color: var(--accent);
    flex: 2;
  }

  .btn-start:hover { background: var(--accent); color: var(--bg); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start:disabled:hover { background: transparent; color: var(--accent); }

  /* ─── SIDEBAR ─── */
  .sidebar {
    grid-column: 2;
    padding: 40px 0;
    border-left: 1px solid var(--border);
    padding-left: 32px;
    display: flex;
    flex-direction: column;
  }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .interval-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .interval-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
    font-size: 12px;
  }

  .interval-row:last-child { border-bottom: none; }

  .i-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .interval-row.done .i-dot { background: var(--green); }
  .interval-row.active .i-dot { background: var(--red); animation: blink 0.6s infinite alternate; }
  .interval-row.next-up .i-dot { background: var(--accent); }

  .i-time {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    min-width: 38px;
  }

  .interval-row.done .i-time { color: var(--green); }
  .interval-row.active .i-time { color: var(--red); }
  .interval-row.next-up .i-time { color: var(--accent); }

  .i-name {
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .interval-row.done .i-name { color: #3a5a3a; }
  .interval-row.active .i-name { color: var(--text); font-weight: 500; }
  .interval-row.next-up .i-name { color: var(--text); }

  .i-check { margin-left: auto; color: var(--green); font-size: 12px; opacity: 0; }
  .interval-row.done .i-check { opacity: 1; }

  /* ─── FOOTER ─── */
  footer {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-top: 1px solid var(--border);
  }

  .footer-stat {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .footer-stat span {
    color: var(--accent);
    font-size: 13px;
  }

  /* ─── COMPLETE OVERLAY ─── */
  .complete-overlay {
    position: fixed;
    inset: 0;
    background: rgba(14,14,14,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  .complete-overlay.visible { opacity: 1; pointer-events: all; }

  .complete-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 8px;
    color: var(--accent);
    line-height: 1;
    text-align: center;
  }

  .complete-sub {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 12px;
    margin-bottom: 40px;
  }

  /* responsive */
  @media (max-width: 700px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto auto;
      padding: 0 16px;
    }
    .sidebar {
      grid-column: 1;
      border-left: none;
      border-top: 1px solid var(--border);
      padding-left: 0;
      padding-top: 24px;
    }
    .big-time { font-size: clamp(80px, 22vw, 120px); }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="logo">E2MOM</div>
    <div class="header-meta">Upper Body // 20 min</div>
  </header>

  <!-- MAIN -->
  <main class="main-panel">

    <div class="state-tag" id="state-tag">
      <span class="blink-dot"></span>
      <span id="state-text">Ready</span>
    </div>

    <div class="time-wrap">
      <div class="big-time" id="big-time">20:00</div>
      <div class="work-time" id="work-time">45</div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>

    <div class="current-exercise" id="ex-card">
      <div class="ex-glyph" id="ex-glyph">💪</div>
      <div class="ex-info">
        <div class="ex-title" id="ex-title">Push-ups</div>
        <div class="ex-hint" id="ex-hint">Starting at 20:00</div>
      </div>
      <div class="round-tag">
        <span class="round-num" id="round-num">01</span>
        of 10
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btn-start" onclick="handleStart()">Start Session</button>
      <button class="btn" onclick="resetTimer()">Reset</button>
    </div>

  </main>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Session Schedule</div>
    <div class="interval-scroll" id="interval-list"></div>
  </aside>

  <!-- FOOTER -->
  <footer>
    <div class="footer-stat">Work <span>45s</span></div>
    <div class="footer-stat">Rest <span>~75s</span></div>
    <div class="footer-stat">Rounds <span>10</span></div>
    <div class="footer-stat">Total <span>20 min</span></div>
  </footer>

</div>

<!-- Complete overlay -->
<div class="complete-overlay" id="complete-overlay">
  <div class="complete-title">Session<br>Complete</div>
  <div class="complete-sub">10 rounds // upper body done</div>
  <button class="btn btn-start" style="width:200px;" onclick="resetTimer()">New Session</button>
</div>

<script>
const TOTAL = 20 * 60;
const WORK = 45;
const INTERVAL = 2 * 60;

const exercises = [
  { name: "Push-ups",            glyph: "💪" },
  { name: "Parallette Pull-ups", glyph: "🤸" },
  { name: "Dips",                glyph: "🔥" },
];

const checkpoints = [];
for (let t = TOTAL; t >= 0; t -= INTERVAL) checkpoints.push(t);

let remaining = TOTAL;
let ticker = null;
let inWork = false;
let workLeft = 0;
let currentRound = 0;
let audioCtx = null;
let alarmId = null;
let running = false;

function fmt(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function getEx(r) { return exercises[r % exercises.length]; }

function audio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, dur, vol) {
  const ctx = audio();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'square';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.25, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  osc.start(); osc.stop(ctx.currentTime + dur);
}

function startAlarm() {
  stopAlarm();
  beep(880, 0.15, 0.3);
  alarmId = setInterval(() => beep(880, 0.15, 0.3), 650);
}

function stopAlarm() {
  if (alarmId) { clearInterval(alarmId); alarmId = null; }
}

function chime() {
  beep(660, 0.15, 0.2);
  setTimeout(() => beep(880, 0.2, 0.2), 160);
}

// ─── BUILD SIDEBAR ───
function buildList() {
  const el = document.getElementById('interval-list');
  el.innerHTML = checkpoints.map((t, i) => {
    const ex = getEx(i);
    return `<div class="interval-row" id="irow-${i}">
      <span class="i-dot"></span>
      <span class="i-time">${fmt(t)}</span>
      <span class="i-name">${ex.name}</span>
      <span class="i-check">✓</span>
    </div>`;
  }).join('');
}

function updateList() {
  checkpoints.forEach((_, i) => {
    const row = document.getElementById(`irow-${i}`);
    if (!row) return;
    row.className = 'interval-row';
    if (i < currentRound) row.classList.add('done');
    else if (i === currentRound) row.classList.add(inWork ? 'active' : 'next-up');
  });
  // scroll active into view
  const active = document.querySelector('.interval-row.active, .interval-row.next-up');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─── STATE DISPLAY ───
function setStateTag(mode) {
  const tag = document.getElementById('state-tag');
  const txt = document.getElementById('state-text');
  tag.className = 'state-tag ' + mode;
  txt.textContent = mode === 'working' ? 'Working' : mode === 'resting' ? 'Rest' : 'Ready';
}

function updateUI() {
  const bigTime = document.getElementById('big-time');
  const workTime = document.getElementById('work-time');
  const progFill = document.getElementById('prog-fill');
  const exCard = document.getElementById('ex-card');
  const exHint = document.getElementById('ex-hint');
  const roundNum = document.getElementById('round-num');

  if (inWork) {
    bigTime.textContent = fmt(remaining);
    bigTime.className = 'big-time working';
    workTime.textContent = workLeft + 's';
    workTime.className = 'work-time visible';
    exCard.className = 'current-exercise working';
    exHint.textContent = workLeft + 's remaining — go!';
    progFill.className = 'progress-fill working';
    progFill.style.width = (workLeft / WORK * 100) + '%';
    setStateTag('working');
  } else {
    bigTime.textContent = fmt(remaining);
    bigTime.className = 'big-time';
    workTime.className = 'work-time';
    exCard.className = 'current-exercise';
    progFill.className = 'progress-fill';
    progFill.style.width = (remaining / TOTAL * 100) + '%';
    setStateTag(running ? 'resting' : 'ready');

    const nextEx = getEx(currentRound);
    const nextTime = checkpoints[currentRound];
    document.getElementById('ex-glyph').textContent = nextEx.glyph;
    document.getElementById('ex-title').textContent = nextEx.name;
    exHint.textContent = nextTime !== undefined
      ? (running ? `Next set at ${fmt(nextTime)}` : `Starting at ${fmt(nextTime)}`)
      : 'All done!';
    roundNum.textContent = String(Math.min(currentRound + 1, 10)).padStart(2,'0');
  }
  updateList();
}

// ─── WORK / REST ───
function triggerWork() {
  inWork = true;
  workLeft = WORK;
  const ex = getEx(currentRound);
  document.getElementById('ex-glyph').textContent = ex.glyph;
  document.getElementById('ex-title').textContent = ex.name;
  document.getElementById('round-num').textContent = String(currentRound + 1).padStart(2,'0');
  startAlarm();
  updateUI();
}

function endWork() {
  inWork = false;
  stopAlarm();
  chime();
  currentRound++;
  updateUI();
}

function complete() {
  clearInterval(ticker); ticker = null; running = false;
  stopAlarm();
  document.getElementById('big-time').textContent = '00:00';
  document.getElementById('complete-overlay').classList.add('visible');
  beep(440, 0.3, 0.3);
  setTimeout(() => beep(550, 0.3, 0.3), 350);
  setTimeout(() => beep(660, 0.5, 0.3), 700);
}

// ─── TICK ───
function tick() {
  if (inWork) {
    workLeft--;
    if (workLeft <= 0) { endWork(); return; }
  } else {
    if (remaining <= 0) { complete(); return; }
    remaining--;
    // check if we hit a checkpoint
    if (currentRound < checkpoints.length && remaining === checkpoints[currentRound]) {
      triggerWork();
      return;
    }
  }
  updateUI();
}

// ─── CONTROLS ───
function handleStart() {
  if (running) return;
  audio().resume();
  running = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-start').textContent = 'Running';

  // If at exact start, trigger first work immediately
  if (remaining === TOTAL && currentRound === 0) {
    triggerWork();
  }
  ticker = setInterval(tick, 1000);
}

function resetTimer() {
  clearInterval(ticker); ticker = null;
  stopAlarm();
  remaining = TOTAL; currentRound = 0; inWork = false; workLeft = 0; running = false;
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-start').textContent = 'Start Session';
  document.getElementById('complete-overlay').classList.remove('visible');
  setStateTag('ready');
  const ex = getEx(0);
  document.getElementById('ex-glyph').textContent = ex.glyph;
  document.getElementById('ex-title').textContent = ex.name;
  document.getElementById('ex-hint').textContent = 'Starting at 20:00';
  document.getElementById('round-num').textContent = '01';
  document.getElementById('big-time').textContent = fmt(TOTAL);
  document.getElementById('big-time').className = 'big-time';
  document.getElementById('work-time').className = 'work-time';
  document.getElementById('ex-card').className = 'current-exercise';
  document.getElementById('prog-fill').className = 'progress-fill';
  document.getElementById('prog-fill').style.width = '100%';
  buildList(); updateList();
}

buildList(); updateList();
</script>
</body>
</html>
